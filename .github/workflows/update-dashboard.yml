name: Update Power League Dashboard

on:
  schedule:
    # Run daily at 6 AM Pacific (1 PM UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Fetch data and regenerate dashboard
        run: python power_league_tracker.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add NorCal_Power_League_Dashboard.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
